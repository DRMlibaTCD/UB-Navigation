<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UB Campus Navigator — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  font-family:"DM Sans",sans-serif;
  background:#003876;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Animated background dots */
body::before{
  content:"";
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(245,168,0,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(245,168,0,.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.03) 0%, transparent 70%);
  pointer-events:none;
}

.card{
  text-align:center;
  padding:48px 36px;
  max-width:420px;
  width:90%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(245,168,0,.2);
  border-radius:24px;
  backdrop-filter:blur(12px);
  box-shadow:0 24px 64px rgba(0,0,0,.4);
  position:relative;
  z-index:1;
}

.logo{
  width:80px;height:80px;
  border-radius:50%;
  background:#fff;
  padding:6px;
  margin:0 auto 20px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  display:block;
}

.uni{
  font-family:"Space Mono",monospace;
  font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,.5);
  margin-bottom:6px;
}

.app-name{
  font-family:"Space Mono",monospace;
  font-size:26px;font-weight:700;
  color:#fff;margin-bottom:4px;
}
.app-name span{color:#F5A800}

.divider{
  width:48px;height:3px;
  background:linear-gradient(90deg,#F5A800,#ffd166);
  border-radius:2px;
  margin:20px auto;
}

.icon{font-size:40px;margin-bottom:16px;display:block;
  animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.headline{
  font-size:20px;font-weight:700;
  color:#fff;margin-bottom:10px;line-height:1.3;
}

.sub{
  font-size:14px;color:rgba(255,255,255,.6);
  line-height:1.7;margin-bottom:28px;
}

.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(245,168,0,.15);
  border:1px solid rgba(245,168,0,.3);
  color:#F5A800;
  padding:8px 20px;border-radius:40px;
  font-size:12px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:28px;
}
.badge::before{
  content:"";width:7px;height:7px;
  background:#F5A800;border-radius:50%;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.7)}
}

.features{
  display:flex;justify-content:center;gap:20px;
  margin-bottom:28px;flex-wrap:wrap;
}
.feat{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.feat-icon{font-size:20px}
.feat-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.05em}

.footer{
  font-size:11px;color:rgba(255,255,255,.3);
  font-family:"Space Mono",monospace;
  margin-top:8px;
}
.footer span{color:#F5A800}
</style>
</head>
